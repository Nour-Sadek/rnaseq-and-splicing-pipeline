# files parameters
csv_reads: './test_data/test_csv.txt'  # './test_data/test_csv.txt' './test_data_single/test_csv_single.txt'
outputDir: './results'
genomeFastaFile: './test_data/genome_files/genome.fasta' # './genome_files/Caenorhabditis_elegans.WBcel235.dna.toplevel.fa'
transcriptFastaFile: './test_data/genome_files/transcriptome.fasta' # './genome_files/Caenorhabditis_elegans.WBcel235.cdna.all.fa'
annotationsGTFFile: './test_data/genome_files/genes_with_empty_tid.gtf' # './genome_files/Caenorhabditis_elegans.WBcel235.115.gtf'
annotationsGFF3File: './test_data/genome_files/genes.gff' # './genome_files/Caenorhabditis_elegans.WBcel235.115.gff3'

# which tools to use for each process
trimming: 'bbduk'  # available options are: 'trimmomatic', 'bbduk', 'trim_galore'
aligner: null  # available options are: 'star', 'hisat2', 'none'
quantifier: 'kallisto'  # available options are: 'htseq-count', 'featureCounts', 'salmon-quasi-mapping-mode', 'kallisto'
splicingAnalyzer: 'whippet'  # available options are: 'majiq', 'rMats', 'suppa2', 'whippet', 'jum'

# Specify whether individual and/or differential splicing analysis is desired
individualSplicingAnalysis: true
differentialSplicingAnalysis: false

# Specify whether reads are paired or single end
paired_end: true

# Choose whether to run Fastqc before and/or after trimming
run_fastqc_before_trimming: true
run_fastqc_after_trimming: false

# Bowtie2 filtering parameters
filter_contaminants: false
contaminants: ['./genome_files/Caenorhabditis_elegans.WBcel235.ncrna.fa.gz']  # provide as a list of paths for the contaminant files

#--------------------------- Trimmomatic parameters ---------------------------#
# Change the value for any trimming step (from none) for it to be included. Make sure to have at least one trimming option active, otherwise there will be an error.
# If you want to use ILLUMINACLIP command, then at least these four parameters need to have values: <adapters_file>, <seed_mismatches>, <palindrome_clip_threshold>, <simple_clip_threshold>
# If you want to use SLIDINGWINDOW command, then both <window_size> and <required_quality> need to have values.
